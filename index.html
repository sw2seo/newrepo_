<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>홍길동 | 프로필</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <div class="card-header">
            <div class="avatar">SW</div>
            <h1>홍길동</h1>
            <p class="subtitle">Web Developer in Training</p>
        </div>
        <div class="card-body">
            <div class="info-item">
                <span class="label">공부 중</span>
                <span class="value">HTML, CSS, JavaScript</span>
            </div>
            <div class="info-item">
                <span class="label">관심 분야</span>
                <span class="value">웹 개발, 프론트엔드</span>
            </div>
            <div class="info-item">
                <span class="label">목표</span>
                <span class="value">멋진 웹사이트 만들기!</span>
            </div>
        </div>
        <div class="card-footer">
            <a href="https://github.com/USERNAME" class="btn">GitHub</a>
        </div>
    </div>
    
    <button onclick="document.body.classList.toggle('dark-mode')">
            다크 모드 전환(어두운 화면)
        </button>
</body>
</html>
